<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Door Lock AI</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0"></script>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface"></script>

</head>

<body>

<div class="container">

    <h1>SMART DOOR LOCK</h1>

    <p class="subtitle">AI Face Detection Demo</p>

    <div id="modeSelection">

       <h2>Select Authentication Mode</h2>

     <button id="faceModeBtn">
        Face Recognition
     </button>

     <button id="rfidModeBtn">
        RFID Card
     </button>

    </div>

    <div id="faceMode">

    <div class="desktopLayout">

        <!-- LEFT PANEL -->
        <div class="leftPanel">

            <div class="status">

                <img id="lockIcon" src="">

                <h2 id="doorStatus">LOCKED</h2>

            </div>

            <div class="camera">

                <video id="video" autoplay playsinline muted></video>

                <div class="scanLine"></div>

            </div>

        </div>

        <!-- RIGHT PANEL -->
        <div class="rightPanel">

            <div class="buttons">

                <button id="registerBtn">REGISTER FACE</button>

                <button id="scanBtn">SCAN FACE</button>

                <button id="lockBtn">LOCK DOOR</button>

            </div>

            <div class="info">

                <h2 id="message">SYSTEM READY</h2>

                <p id="subMessage">Door Locked</p>

            </div>

            <div class="timer">

                <h3>AUTO LOCK</h3>

                <span id="countdown">--</span>

            </div>

            <div class="progress">

                <div id="progressBar"></div>

            </div>

        </div>

    </div>

</div>

    <div id="rfidMode" style="display:none;">

    <div class="desktopLayout">

        <!-- LEFT PANEL -->
        <div class="leftPanel">

            <div class="status">

                

                <h2 id="rfidDoorStatus">LOCKED</h2>

            </div>

            <div class="rfidCard">

                <img src="icons/rfid-card.jpg"
                     alt="RFID Card"
                     class="cardImage">

                <div class="pulseCircle"></div>

            </div>

        </div>

        <!-- RIGHT PANEL -->
        <div class="rightPanel">

            <div class="buttons">

                <button id="registerCardBtn">
                    REGISTER CARD
                </button>

                <button id="scanCardBtn">
                    SCAN CARD
                </button>

                <button id="lockDoorBtn">
                    LOCK DOOR
                </button>

            </div>

            <div class="info">

                <h2 id="rfidMessage">
                    SYSTEM READY
                </h2>

                <p id="rfidSubMessage">
                    Tap your RFID Card
                </p>

            </div>

            <div class="timer">

                <h3>AUTO LOCK</h3>

                <span id="rfidCountdown">--</span>

            </div>

            <div class="progress">

                <div id="rfidProgressBar"></div>

            </div>

        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<script src="script.js"></script>

</body>

</html>
